<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giulia</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f9d4e8 0%, #e8d4f9 50%, #d4c4f0 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      padding: 48px 20px 40px;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #d63faa, #8b3fd6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: white;
      font-weight: 500;
      margin-bottom: 14px;
      border: 3px solid rgba(255, 255, 255, 0.7);
    }

    .name {
      font-size: 22px;
      font-weight: 600;
      color: #3a1a5c;
      margin-bottom: 6px;
    }

    .handle {
      font-size: 14px;
      color: #7a4a9c;
      margin-bottom: 32px;
    }

    .links {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255, 255, 255, 0.75);
      border: 1.5px solid rgba(200, 160, 230, 0.5);
      border-radius: 16px;
      padding: 14px 20px;
      cursor: pointer;
      text-decoration: none;
      color: #3a1a5c;
      transition: transform 0.15s, background 0.15s;
    }

    .link-btn:hover {
      background: rgba(255, 255, 255, 0.95);
      transform: scale(1.02);
    }

    .link-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon-insta  { background: linear-gradient(135deg, #f9a8d4, #c084fc); }
    .icon-tiktok { background: linear-gradient(135deg, #2d2d2d, #6b21a8); }
    .icon-wattpad{ background: linear-gradient(135deg, #fb923c, #e11d48); }

    .link-text { flex: 1; }

    .link-label {
      font-size: 13px;
      color: #7a4a9c;
      margin-bottom: 1px;
    }

    .link-name {
      font-size: 15px;
      font-weight: 600;
    }

    .arrow {
      color: #9a6abf;
      font-size: 20px;
    }

    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: #9a6abf;
    }
  </style>
</head>
<body>

  <div class="avatar">G</div>
  <div class="name">Giulia</div>
  <div class="handle">@giuliarsrs</div>

  <div class="links">

    <a class="link-btn" href="https://www.instagram.com/giuliarsrs/" target="_blank">
      <div class="link-icon icon-insta">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="1" fill="white" stroke="none"/>
        </svg>
      </div>
      <div class="link-text">
        <div class="link-label">Instagram</div>
        <div class="link-name">@giuliarsrs</div>
      </div>
      <span class="arrow">›</span>
    </a>

    <a class="link-btn" href="https://www.tiktok.com/@011giupcd" target="_blank">
      <div class="link-icon icon-tiktok">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
          <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.94a8.17 8.17 0 0 0 4.78 1.52V7.01a4.85 4.85 0 0 1-1.01-.32z"/>
        </svg>
      </div>
      <div class="link-text">
        <div class="link-label">TikTok</div>
        <div class="link-name">@011giupcd</div>
      </div>
      <span class="arrow">›</span>
    </a>

    <a class="link-btn" href="https://www.wattpad.com/user/DonaGiuliaa" target="_blank">
      <div class="link-icon icon-wattpad">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4,4 7.5,17 10,9 12,14 14.5,6 18,20 20,4"/>
        </svg>
      </div>
      <div class="link-text">
        <div class="link-label">Wattpad</div>
        <div class="link-name">DonaGiuliaa</div>
      </div>
      <span class="arrow">›</span>
    </a>

  </div>

  <div class="footer">✦ feito com carinho ✦</div>

</body>
</html>
